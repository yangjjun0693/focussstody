<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Focussstody | $STUDY Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        *::-webkit-scrollbar {
            display: none;
        }
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f0ede8;
            --ink: #2a2520;
            --ink2: #7a7268;
            --accent: #7c78b8;
            --glass: rgba(255,255,255,0.5);
            --border: rgba(255,255,255,0.65);
        }

        html.dark {
            --bg: #1a1b1e;
            --ink: #e8e4dc;
            --ink2: #7a7570;
            --accent: #7c78b8;
            --glass: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.07);
        }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            transition: background 0.4s ease, color 0.4s ease;
        }

        /* Blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }
        .blob-1 {
            width: 500px;
            height: 500px;
            background: rgba(124,120,184,0.12);
            top: -100px;
            right: -100px;
            animation: drift1 12s ease-in-out infinite;
        }
        .blob-2 {
            width: 400px;
            height: 400px;
            background: rgba(155,151,232,0.1);
            bottom: 5%;
            left: -80px;
            animation: drift2 15s ease-in-out infinite;
        }
        @keyframes drift1 {
            0%,100% { transform: translate(0,0); }
            50% { transform: translate(30px,-40px); }
        }
        @keyframes drift2 {
            0%,100% { transform: translate(0,0); }
            50% { transform: translate(-20px,30px); }
        }

        /* Container */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem 8rem;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .store-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 3rem;
            animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0.4;
            cursor: pointer;
            background: none;
            border: none;
            color: inherit;
            transition: opacity 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .back-btn:hover { opacity: 1; }

        .logo-area {
            text-align: center;
        }
        .logo-eyebrow {
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            opacity: 0.4;
            margin-bottom: 0.25rem;
        }
        .logo-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            font-weight: 900;
            letter-spacing: -0.02em;
        }

        /* Balance Pill */
        .balance-pill {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 1.25rem;
            border-radius: 2rem;
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
        }
        html.dark .balance-pill {
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .balance-label {
            font-size: 8px;
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0.4;
        }
        .balance-num {
            font-family: 'DM Mono', monospace;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: -0.02em;
        }
        .balance-currency {
            font-size: 10px;
            font-weight: 800;
            opacity: 0.4;
        }

        /* Tabs */
        .tabs-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
            animation: fadeUp 0.6s 0.1s cubic-bezier(0.22,1,0.36,1) both;
        }
        .tabs {
            display: flex;
            gap: 0.5rem;
            padding: 0.35rem;
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 1rem;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
        }
        html.dark .tabs {
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .tab {
            padding: 0.6rem 1.5rem;
            border: none;
            background: transparent;
            border-radius: 0.75rem;
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            color: inherit;
            opacity: 0.45;
            transition: all 0.2s ease;
        }
        .tab.active {
            background: rgba(255,255,255,0.5);
            opacity: 1;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        html.dark .tab.active {
            background: rgba(255,255,255,0.1);
        }

        /* Items Grid */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            animation: fadeUp 0.6s 0.2s cubic-bezier(0.22,1,0.36,1) both;
        }

        /* Glass Card */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.8);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            overflow: hidden;
        }
        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.9);
        }
        html.dark .glass-card {
            box-shadow: 0 8px 32px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        html.dark .glass-card:hover {
            box-shadow: 0 12px 40px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.08);
        }

        .item-card {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .item-top {
            display: flex;
            align-items: center;
            gap: 0.875rem;
        }

        .item-preview {
            width: 56px;
            height: 56px;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
            background: rgba(255,255,255,0.1);
        }

        .item-info {
            flex: 1;
            min-width: 0;
        }
        .item-name {
            font-size: 13px;
            font-weight: 900;
            letter-spacing: -0.01em;
            margin-bottom: 0.2rem;
        }
        .item-desc {
            font-size: 9px;
            font-weight: 600;
            opacity: 0.4;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .item-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 0.5rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .item-price {
            font-size: 10px;
            font-weight: 800;
            opacity: 0.5;
            letter-spacing: 0.05em;
        }
        .item-price.free {
            color: #4ade80;
            opacity: 1;
        }

        .item-btn {
            padding: 0.45rem 1rem;
            border-radius: 0.7rem;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .btn-buy {
            background: var(--accent);
            color: #fff;
        }
        .btn-buy:hover {
            filter: brightness(1.1);
            transform: scale(1.02);
        }
        .btn-equip {
            background: rgba(255,255,255,0.12);
            color: inherit;
        }
        .btn-equip:hover {
            background: rgba(255,255,255,0.2);
        }
        .btn-active {
            background: rgba(74,222,128,0.15);
            color: #4ade80;
            border: 1px solid rgba(74,222,128,0.3);
        }
        .btn-locked {
            background: rgba(255,255,255,0.05);
            color: inherit;
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            padding: 0.75rem 1.5rem;
            background: var(--accent);
            color: #fff;
            border-radius: 2rem;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.22,1,0.36,1);
            pointer-events: none;
            white-space: nowrap;
            z-index: 999;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Animations */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 3rem;
            opacity: 0.3;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .container {
                padding: 1rem 1rem 6rem;
            }
            .store-header {
                margin-bottom: 2rem;
            }
            .items-grid {
                grid-template-columns: 1fr;
            }
            .tab {
                padding: 0.5rem 1rem;
            }
        }
    </style>
    <script>
        (function() {
            const ACCENTS = { default:'#6964c6',midnight:'#60a5fa',forest:'#4ade80',sunset:'#f97316',ocean:'#22d3ee',mono:'#a3a3a3',cherry:'#fb7185',galaxy:'#a78bfa',gold:'#fbbf24' };
            const key = localStorage.getItem('fv_theme') || 'default';
            const accent = ACCENTS[key] || '#6964c6';
            document.documentElement.style.setProperty('--accent', accent);
            if (localStorage.getItem('darkMode') === 'true') document.documentElement.classList.add('dark');
        })();
    </script>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <!-- Header -->
        <div class="store-header">
            <button class="back-btn" onclick="window.location.href='./app.html'">
                ← Back
            </button>

            <div class="logo-area">
                <div class="logo-eyebrow">Focussstody</div>
                <div class="logo-title">$STUDY Store</div>
            </div>

            <div class="balance-pill">
                <div>
                    <div class="balance-label">Balance</div>
                    <div class="balance-num" id="balanceDisplay">0.000</div>
                </div>
                <div class="balance-currency">$STUDY</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs-wrapper">
            <div class="tabs" id="tabs">
                <button class="tab active" data-cat="themes">🎨 Themes</button>
                <button class="tab" data-cat="badges">🏆 Badges</button>
            </div>
        </div>

        <!-- Items Grid -->
        <div class="items-grid" id="itemsGrid"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module">
        import { requireAuth } from './js/authcheck.js';
        const auth = await requireAuth();
        if (!auth) throw new Error('Not authenticated');
        const { supabase: _sb, userId: _userId, username: currentUser, profile, studyRow: _sr } = auth;
        let _studyRow = _sr;
        let _storeItems = [...(_studyRow.store_items || [])];
        const isPro = profile.is_pro || false;

        function getTokens() { return (_studyRow.total_exp || 0) * 0.016; }
        
        async function saveStoreItems(items) {
            await _sb.from('study_data').update({ store_items: items, updated_at: new Date().toISOString() }).eq('user_id', _userId);
        }

        const THEMES_KEY = 'fv_theme';

        async function deductTokens(price) {
            const cost = Math.round(price / 0.016);
            const newExp = Math.max(0, (_studyRow.total_exp || 0) - cost);
            _studyRow.total_exp = newExp;
            await _sb.from('study_data').update({ total_exp: newExp, updated_at: new Date().toISOString() }).eq('user_id', _userId);
        }

        const CATALOG = {
            themes: [
                { id: 'midnight', name: 'Midnight', price: 20, proFree: true, preview: ['#1e3a5f','#60a5fa'], emoji: '🌙', desc: 'Deep blue night' },
                { id: 'forest', name: 'Forest', price: 50, proFree: true, preview: ['#065f46','#4ade80'], emoji: '🌲', desc: 'Into the woods' },
                { id: 'sunset', name: 'Sunset', price: 75, proFree: true, preview: ['#c2410c','#f97316'], emoji: '🌅', desc: 'Golden hour vibes' },
                { id: 'ocean', name: 'Ocean', price: 75, proFree: true, preview: ['#0e7490','#22d3ee'], emoji: '🌊', desc: 'Deep sea focus' },
                { id: 'mono', name: 'Mono', price: 100, proFree: true, preview: ['#404040','#a3a3a3'], emoji: '⬛', desc: 'Pure grayscale' },
                { id: 'cherry', name: 'Cherry', price: 150, proFree: true, preview: ['#9f1239','#fb7185'], emoji: '🍒', desc: 'Bold and red' },
                { id: 'galaxy', name: 'Galaxy', price: 200, proFree: true, preview: ['#1e1b4b','#a78bfa'], emoji: '🌌', desc: 'Cosmic purple' },
                { id: 'gold', name: 'Gold', price: 300, proFree: true, preview: ['#78350f','#fbbf24'], emoji: '✨', desc: 'Rare & legendary' },
            ],
            badges: [
                { id: 'night_owl', name: 'Night Owl', price: 80, proFree: true, emoji: '🦉', desc: 'Late night grinder' },
                { id: 'grinder', name: 'Grinder', price: 120, proFree: true, emoji: '⚙️', desc: 'Never stops working' },
                { id: 'galaxy_brain', name: 'Galaxy Brain', price: 200, proFree: true, emoji: '🧠', desc: 'Big brain energy' },
                { id: 'speedrun', name: 'Speedrunner', price: 150, proFree: true, emoji: '⚡', desc: 'Fast & focused' },
                { id: 'legend', name: 'Legend', price: 300, proFree: true, emoji: '👑', desc: 'The rarest title' },
            ],
        };

        const ALL_THEMES = {
            default: { accent:'#6964c6', bgLight:'#d0cbe5' },
            midnight: { accent:'#60a5fa', bgLight:'#0f172a' },
            forest: { accent:'#4ade80', bgLight:'#d1fae5' },
            sunset: { accent:'#f97316', bgLight:'#fef3c7' },
            ocean: { accent:'#22d3ee', bgLight:'#cffafe' },
            mono: { accent:'#a3a3a3', bgLight:'#f5f5f5' },
            cherry: { accent:'#fb7185', bgLight:'#fff1f2' },
            galaxy: { accent:'#a78bfa', bgLight:'#ede9fe' },
            gold: { accent:'#fbbf24', bgLight:'#fffbeb' },
        };

        function applyTheme(key) {
            const t = ALL_THEMES[key]; 
            if (!t) return;
            const r = document.documentElement;
            r.style.setProperty('--accent', t.accent);
            if (!document.documentElement.classList.contains('dark')) {
                document.body.style.background = t.bgLight;
            }
            localStorage.setItem(THEMES_KEY, key);
        }

        const isDark = localStorage.getItem('darkMode') === 'true';
        document.documentElement.classList.toggle('dark', isDark);

        const savedTheme = localStorage.getItem(THEMES_KEY) || 'default';
        applyTheme(savedTheme);

        let activeCat = 'themes';

        function updateBalance() {
            document.getElementById('balanceDisplay').textContent = getTokens().toFixed(3);
        }

        function showToast(msg, color = '#4ade80') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = color;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        async function handleAction(btn) {
            const id = btn.dataset.id;
            const cat = btn.dataset.cat;
            const price = parseInt(btn.dataset.price);
            const owned = _storeItems.includes(id);
            const isFree = isPro && CATALOG[cat]?.find(i => i.id === id)?.proFree;
            const item = CATALOG[cat]?.find(i => i.id === id);

            if (owned || isFree) {
                // Equip
                if (cat === 'badges') {
                    await _sb.from('study_data').update({ 
                        active_badge: id,
                        updated_at: new Date().toISOString() 
                    }).eq('user_id', _userId);
                    showToast(`${item?.name} equipped! ✓`, '#4ade80');
                } else if (cat === 'themes') {
                    applyTheme(id);
                    localStorage.setItem(THEMES_KEY, id);
                    await _sb.from('study_data').update({ 
                        active_theme: id,
                        updated_at: new Date().toISOString() 
                    }).eq('user_id', _userId);
                    showToast(`${item?.name} equipped! ✓`, '#4ade80');
                }
            } else {
                // Buy
                const tokens = getTokens();
                if (tokens < price) {
                    showToast(`Need ${price} $STUDY`, '#f87171');
                    return;
                }

                await deductTokens(price);
                
                _storeItems.push(id);
                await saveStoreItems(_storeItems);

                if (cat === 'badges') {
                    await _sb.from('study_data').update({ 
                        active_badge: id,
                        updated_at: new Date().toISOString() 
                    }).eq('user_id', _userId);
                } else if (cat === 'themes') {
                    applyTheme(id);
                    localStorage.setItem(THEMES_KEY, id);
                    await _sb.from('study_data').update({ 
                        active_theme: id,
                        updated_at: new Date().toISOString() 
                    }).eq('user_id', _userId);
                }
                
                showToast(`${item?.name} purchased & equipped! ✓`, '#4ade80');
                updateBalance();
            }
            render(activeCat);
        }

        function render(cat) {
            activeCat = cat;
            updateBalance();
            const tokens = getTokens();
            const items = CATALOG[cat] || [];
            const grid = document.getElementById('itemsGrid');

            if (!items.length) {
                grid.innerHTML = '<div class="empty-state">Nothing here yet</div>';
                return;
            }

            grid.innerHTML = items.map(item => {
                const owned = _storeItems.includes(item.id);
                const isFree = isPro && item.proFree;
                const cost = isFree ? 0 : item.price;
                const canAfford = tokens >= cost;
                const isActive = (cat === 'themes' && localStorage.getItem(THEMES_KEY) === item.id);

                let btnLabel, btnCls;
                if (owned || isFree) {
                    btnLabel = isActive ? 'Active ✓' : 'Equip';
                    btnCls = isActive ? 'btn-active' : 'btn-equip';
                } else {
                    btnLabel = canAfford ? `Buy ${cost}` : `${cost} $STUDY`;
                    btnCls = canAfford ? 'btn-buy' : 'btn-locked';
                }

                const previewStyle = item.preview
                    ? `background:linear-gradient(135deg,${item.preview[0]},${item.preview[1]})`
                    : 'background:rgba(255,255,255,0.1)';

                return `
                    <div class="glass-card item-card">
                        <div class="item-top">
                            <div class="item-preview" style="${previewStyle}">${item.emoji}</div>
                            <div class="item-info">
                                <div class="item-name">${item.name}</div>
                                <div class="item-desc">${item.desc}</div>
                            </div>
                        </div>
                        <div class="item-footer">
                            <div class="item-price ${isFree ? 'free' : ''}">${isFree ? '✦ Free with Pro' : cost === 0 ? '' : cost + ' $STUDY'}</div>
                            <button class="item-btn ${btnCls}"
                                data-id="${item.id}" data-cat="${cat}" data-price="${cost}"
                                ${(!owned && !isFree && !canAfford) ? 'disabled' : ''}>
                                ${btnLabel}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            grid.querySelectorAll('.item-btn').forEach(btn => {
                btn.addEventListener('click', () => handleAction(btn));
            });
        }

        document.getElementById('tabs').querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                render(tab.dataset.cat);
            });
        });

        render('themes');
    </script>
</body>
</html>s
