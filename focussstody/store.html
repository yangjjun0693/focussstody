<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focussstody | $STUDY Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { font-family: 'Inter', sans-serif; min-height: 100vh; }

        body {
            background: #d0cbe5;
            color: #282456;
            transition: background 0.6s ease, color 0.6s ease;
        }
        html.dark body { background: #1a1b1e; color: #f1f5f9; }

        /* ── Glass card ── */
                .glass {
            background: rgba(255,255,255,0.48);
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.75);
            border-radius: 1.5rem;
            box-shadow: 0 8px 32px rgba(100,96,180,0.10), 0 2px 8px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.85);
            position: relative;
            overflow: hidden;
        }
        .glass::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.95) 40%, rgba(255,255,255,0.65) 70%, transparent);
            pointer-events: none; border-radius: 1.5rem 1.5rem 0 0;
        }
        html.dark .glass {
            background: rgba(255,255,255,0.055);
            backdrop-filter: blur(32px) saturate(140%);
            -webkit-backdrop-filter: blur(32px) saturate(140%);
            border-color: rgba(255,255,255,0.10);
            box-shadow: 0 8px 32px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.07);
        }
        html.dark .glass::before {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12) 40%, rgba(255,255,255,0.06) 70%, transparent);
        }

        /* ── Header ── */
        .store-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem 2rem;
            max-width: 900px;
            margin: 0 auto;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0.4;
            cursor: pointer;
            background: none;
            border: none;
            color: inherit;
            transition: opacity 0.2s;
        }
        .back-btn:hover { opacity: 1; }

        .balance-pill {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 11px;
            font-weight: 800;
            background: rgba(255,255,255,0.45);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.70);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.85), 0 4px 16px rgba(100,96,180,0.08);
        }
        html.dark .balance-pill {
            background: rgba(255,255,255,0.07);
            border-color: rgba(255,255,255,0.12);
            box-shadow: none;
        }

        .balance-num {
            font-family: 'Times New Roman', serif;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
        }

        /* ── Tabs ── */
        .tabs {
            display: flex;
            gap: 0.5rem;
            padding: 0.35rem;
            border-radius: 1rem;
            width: fit-content;
            margin: 0 auto 2rem;
            background: rgba(255,255,255,0.42);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.68);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.85), 0 4px 16px rgba(100,96,180,0.06);
        }
        html.dark .tabs {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.10);
            box-shadow: none;
        }

        .tab {
            padding: 0.6rem 1.25rem;
            border: none;
            background: transparent;
            border-radius: 0.75rem;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            color: inherit;
            opacity: 0.45;
            transition: all 0.2s ease;
        }
        .tab.active {
            background: #fff;
            opacity: 1;
            color: #1a1b1e;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        html.dark .tab.active {
            background: rgba(255,255,255,0.15);
            color: #f1f5f9;
            box-shadow: none;
        }

        /* ── Grid ── */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
        }

        /* ── Item card ── */
        .item-card {
            border-radius: 1.25rem;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: transform 0.2s ease;
            cursor: default;
        }
        .item-card:hover { transform: translateY(-2px); }

        .item-top {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .item-preview {
            width: 52px;
            height: 52px;
            border-radius: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .item-name { font-size: 13px; font-weight: 900; letter-spacing: -0.01em; margin-bottom: 0.15rem; }
        .item-desc { font-size: 10px; opacity: 0.45; font-weight: 600; }

        .item-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .item-price {
            font-size: 10px;
            font-weight: 800;
            opacity: 0.5;
            letter-spacing: 0.05em;
        }
        .item-price.free { color: #4ade80; opacity: 1; }

        .item-btn {
            padding: 0.45rem 1rem;
            border-radius: 0.6rem;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .btn-buy    { background: #6964c6; color: #fff; }
        .btn-buy:hover { filter: brightness(1.15); transform: scale(1.04); }
        .btn-equip  { background: rgba(255,255,255,0.12); color: inherit; }
        .btn-equip:hover { background: rgba(255,255,255,0.2); }
        .btn-active { background: rgba(74,222,128,0.15); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }
        .btn-locked { background: rgba(255,255,255,0.05); color: inherit; opacity: 0.3; cursor: not-allowed; }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.22,1,0.36,1);
            pointer-events: none;
            white-space: nowrap;
            z-index: 999;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── Sound preview btn ── */
        .preview-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            opacity: 0.5;
            transition: opacity 0.2s;
            padding: 0.2rem;
        }
        .preview-btn:hover { opacity: 1; }
    </style>
<script>
(function() {
    const ACCENTS = { default:'#6964c6',midnight:'#60a5fa',forest:'#4ade80',sunset:'#f97316',ocean:'#22d3ee',mono:'#a3a3a3',cherry:'#fb7185',galaxy:'#a78bfa',gold:'#fbbf24' };
    const key = localStorage.getItem('fv_theme') || 'default';
    const accent = ACCENTS[key] || '#6964c6';
    document.documentElement.style.setProperty('--accent', accent);
    if (localStorage.getItem('darkMode') === 'true') document.documentElement.classList.add('dark');
})();
</script>
</head>
<body>

    <!-- Header -->
    <div class="store-header">
        <button class="back-btn" onclick="window.location.href='./app.html'">
            ← Back to App
        </button>

        <div style="text-align:center;">
            <p style="font-size:10px;font-weight:800;letter-spacing:0.3em;text-transform:uppercase;opacity:0.4;">Focussstody</p>
            <p style="font-size:18px;font-weight:900;letter-spacing:-0.02em;">$STUDY Store</p>
        </div>

        <div class="glass balance-pill">
            <div>
                <p style="font-size:8px;font-weight:800;letter-spacing:0.2em;text-transform:uppercase;opacity:0.4;">Balance</p>
                <p class="balance-num" id="balanceDisplay">0.000</p>
            </div>
            <span style="font-size:11px;font-weight:800;opacity:0.4;">$STUDY</span>
        </div>
    </div>

    <!-- Main -->
    <main style="max-width:900px;margin:0 auto;padding:0 1.5rem 6rem;">

        <!-- Tabs -->
        <div class="tabs" id="tabs">
            <button class="tab active" data-cat="themes">🎨 Themes</button>
            <button class="tab" data-cat="badges">🏆 Badges</button>

        </div>

        <!-- Grid -->
        <div class="items-grid" id="itemsGrid"></div>

    </main>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script type="module">
        import { requireAuth } from './js/authcheck.js';
        const auth = await requireAuth();
        if (!auth) throw new Error('Not authenticated');
        const { supabase: _sb, userId: _userId, username: currentUser, profile, studyRow: _sr } = auth;
        let _studyRow = _sr;
        let _storeItems = [...(_studyRow.store_items || [])];
        const isPro = profile.is_pro || false;

        function getTokens() { return (_studyRow.total_exp || 0) * 0.016; }
        async function saveStoreItems(items) {
            await _sb.from('study_data').update({ store_items: items, updated_at: new Date().toISOString() }).eq('user_id', _userId);
        }

        const THEMES_KEY = 'fv_theme';

        function getOwnedItems() { return _storeItems; }
        function saveOwnedItems(items) {
            _storeItems = [...items];
            saveStoreItems(items);
        }

        // Store state (badges/sounds stored locally, items in Supabase)
        let _storeState = { items: _storeItems, activeBadge: null, activeSound: null };

        function getStore() { return { ..._storeState, items: _storeItems }; }
        function saveStore(store) {
            _storeState = store;
            saveOwnedItems(store.items || []);
        }

        // Deduct tokens in Supabase
        async function deductTokens(price) {
            const cost = Math.round(price / 0.016);
            const newExp = Math.max(0, (_studyRow.total_exp || 0) - cost);
            _studyRow.total_exp = newExp;
            await _sb.from('study_data').update({ total_exp: newExp, updated_at: new Date().toISOString() }).eq('user_id', _userId);
        }





        function owns(itemId) {
            return _storeItems.includes(itemId);
        }

        // ── Catalog ───────────────────────────────────────────────────────
        const CATALOG = {
            themes: [
                { id: 'midnight', name: 'Midnight',  price: 20,  proFree: true,  preview: ['#1e3a5f','#60a5fa'], emoji: '🌙', desc: 'Deep blue night' },
                { id: 'forest',   name: 'Forest',    price: 50,  proFree: true,  preview: ['#065f46','#4ade80'], emoji: '🌲', desc: 'Into the woods' },
                { id: 'sunset',   name: 'Sunset',    price: 75,  proFree: true,  preview: ['#c2410c','#f97316'], emoji: '🌅', desc: 'Golden hour vibes' },
                { id: 'ocean',    name: 'Ocean',     price: 75,  proFree: true,  preview: ['#0e7490','#22d3ee'], emoji: '🌊', desc: 'Deep sea focus' },
                { id: 'mono',     name: 'Mono',      price: 100, proFree: true,  preview: ['#404040','#a3a3a3'], emoji: '⬛', desc: 'Pure grayscale' },
                { id: 'cherry',   name: 'Cherry',    price: 150, proFree: true, preview: ['#9f1239','#fb7185'], emoji: '🍒', desc: 'Bold and red' },
                { id: 'galaxy',   name: 'Galaxy',    price: 200, proFree: true, preview: ['#1e1b4b','#a78bfa'], emoji: '🌌', desc: 'Cosmic purple' },
                { id: 'gold',     name: 'Gold',      price: 300, proFree: true, preview: ['#78350f','#fbbf24'], emoji: '✨', desc: 'Rare & legendary' },
            ],
            badges: [
                { id: 'night_owl',    name: 'Night Owl',    price: 80,  proFree: true, emoji: '🦉', desc: 'For the late night grinders' },
                { id: 'grinder',      name: 'Grinder',      price: 120, proFree: true, emoji: '⚙️', desc: 'Never stops working' },
                { id: 'galaxy_brain', name: 'Galaxy Brain', price: 200, proFree: true, emoji: '🧠', desc: 'Big brain energy' },
                { id: 'speedrun',     name: 'Speedrunner',  price: 150, proFree: true, emoji: '⚡', desc: 'Fast and focused' },
                { id: 'legend',       name: 'Legend',       price: 300, proFree: true, emoji: '👑', desc: 'The rarest title' },
            ],
        };

        // ── Web Audio sounds ──────────────────────────────────────────────
        let audioCtx = null;
        function getCtx() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        }

        const SOUNDS = {
            tick_soft: () => {
                const ctx = getCtx(), osc = ctx.createOscillator(), g = ctx.createGain();
                osc.connect(g); g.connect(ctx.destination);
                osc.frequency.value = 880;
                g.gain.setValueAtTime(0.08, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
                osc.start(); osc.stop(ctx.currentTime + 0.12);
            },
            typewriter: () => {
                const ctx = getCtx(), buf = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
                const d = buf.getChannelData(0);
                for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*(1-i/d.length)*0.4;
                const src = ctx.createBufferSource(), g = ctx.createGain();
                const f = ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=2000;
                src.buffer=buf; src.connect(f); f.connect(g); g.connect(ctx.destination);
                g.gain.value=0.5; src.start();
            },
            lofi_bell: () => {
                const ctx = getCtx(), osc = ctx.createOscillator(), g = ctx.createGain();
                osc.connect(g); g.connect(ctx.destination);
                osc.type='sine'; osc.frequency.value=523;
                g.gain.setValueAtTime(0.2, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+1.5);
                osc.start(); osc.stop(ctx.currentTime+1.5);
            },
            digital: () => {
                const ctx = getCtx(), osc = ctx.createOscillator(), g = ctx.createGain();
                osc.connect(g); g.connect(ctx.destination);
                osc.type='square'; osc.frequency.value=440;
                g.gain.setValueAtTime(0.08, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.08);
                osc.start(); osc.stop(ctx.currentTime+0.08);
            },
        };

        // ── Theme apply ───────────────────────────────────────────────────
        const ALL_THEMES = {
            default:  { accent:'#6964c6', accentDim:'rgba(105,100,198,0.4)', bgLight:'#d0cbe5', bgFocus:'#7a6da2', textPrimary:'#282456' },
            midnight: { accent:'#60a5fa', accentDim:'rgba(96,165,250,0.4)',  bgLight:'#0f172a', bgFocus:'#1e3a5f', textPrimary:'#e2e8f0' },
            forest:   { accent:'#4ade80', accentDim:'rgba(74,222,128,0.4)',  bgLight:'#d1fae5', bgFocus:'#065f46', textPrimary:'#064e3b' },
            sunset:   { accent:'#f97316', accentDim:'rgba(249,115,22,0.4)',  bgLight:'#fef3c7', bgFocus:'#c2410c', textPrimary:'#7c2d12' },
            ocean:    { accent:'#22d3ee', accentDim:'rgba(34,211,238,0.4)',  bgLight:'#cffafe', bgFocus:'#0e7490', textPrimary:'#164e63' },
            mono:     { accent:'#a3a3a3', accentDim:'rgba(163,163,163,0.4)', bgLight:'#f5f5f5', bgFocus:'#404040', textPrimary:'#171717' },
            cherry:   { accent:'#fb7185', accentDim:'rgba(251,113,133,0.4)', bgLight:'#fff1f2', bgFocus:'#9f1239', textPrimary:'#881337' },
            galaxy:   { accent:'#a78bfa', accentDim:'rgba(167,139,250,0.4)', bgLight:'#ede9fe', bgFocus:'#1e1b4b', textPrimary:'#1e1b4b' },
            gold:     { accent:'#fbbf24', accentDim:'rgba(251,191,36,0.4)',  bgLight:'#fffbeb', bgFocus:'#78350f', textPrimary:'#451a03' },
        };

        function applyTheme(key) {
            const t = ALL_THEMES[key]; if (!t) return;
            const r = document.documentElement;
            r.style.setProperty('--accent', t.accent);
            document.body.style.background = document.documentElement.classList.contains('dark') ? '' : t.bgLight;
            localStorage.setItem(THEMES_KEY, key);
        }

        // ── Dark mode ─────────────────────────────────────────────────────
        const isDark = localStorage.getItem('darkMode') === 'true';
        document.documentElement.classList.toggle('dark', isDark);

        // Apply saved theme
        const savedTheme = localStorage.getItem(THEMES_KEY) || 'default';
        applyTheme(savedTheme);

        // ── Render ────────────────────────────────────────────────────────
        let activeCat = 'themes';

        function updateBalance() {
            document.getElementById('balanceDisplay').textContent = getTokens().toFixed(3);
        }

        function render(cat) {
            activeCat = cat;
            updateBalance();
            const store  = getStore();
            const tokens = getTokens();
            const items  = CATALOG[cat] || [];
            const grid   = document.getElementById('itemsGrid');

            grid.innerHTML = items.map(item => {
                const owned   = store.items?.includes(item.id);
                const isFree  = isPro && item.proFree;
                const cost    = isFree ? 0 : item.price;
                const canAfford = tokens >= cost;
                const isActive = (cat === 'badges' && store.activeBadge === item.id)
                               || (cat === 'sounds' && store.activeSound === item.id)
                               || (cat === 'themes' && localStorage.getItem(THEMES_KEY) === item.id);

                let btnLabel, btnCls;
                if (owned || isFree) {
                    btnLabel = isActive ? 'Active ✓' : 'Equip';
                    btnCls   = isActive ? 'btn-active' : 'btn-equip';
                } else {
                    btnLabel = canAfford ? `Buy · ${cost}` : `${cost} $STUDY`;
                    btnCls   = canAfford ? 'btn-buy' : 'btn-locked';
                }

                const previewStyle = item.preview
                    ? `background:linear-gradient(135deg,${item.preview[0]},${item.preview[1]})`
                    : `background:rgba(255,255,255,0.1)`;

                const soundPreview = '';

                return `<div class="item-card glass">
                    <div class="item-top">
                        <div class="item-preview" style="${previewStyle}">${item.emoji}</div>
                        <div style="flex:1;min-width:0;">
                            <p class="item-name">${item.name}</p>
                            <p class="item-desc">${item.desc}</p>
                        </div>
                        ${soundPreview}
                    </div>
                    <div class="item-footer">
                        <p class="item-price ${isFree ? 'free' : ''}">${isFree ? '✦ Free with Pro' : cost === 0 ? '' : cost + ' $STUDY'}</p>
                        <button class="item-btn ${btnCls}"
                            data-id="${item.id}" data-cat="${cat}" data-price="${cost}"
                            ${(!owned && !isFree && !canAfford) ? 'disabled' : ''}>
                            ${btnLabel}
                        </button>
                    </div>
                </div>`;
            }).join('');

            // Buy / equip handlers
            grid.querySelectorAll('.item-btn').forEach(btn => {
                btn.addEventListener('click', () => handleAction(btn));
            });


        }

        async function handleAction(btn) {
            const id    = btn.dataset.id;
            const cat   = btn.dataset.cat;
            const price = parseInt(btn.dataset.price);
            const store = getStore();
            const owned = store.items?.includes(id);
            const isFree = isPro && CATALOG[cat]?.find(i => i.id === id)?.proFree;

            if (owned || isFree) {
                // Equip
                if (cat === 'badges') {
                    store.activeBadge = id;
                    saveStore(store);
                    showToast(`Badge equipped! ✓`, '#4ade80');
                } else if (cat === 'themes') {
                    applyTheme(id);
                    showToast(`Theme applied! ✓`, '#4ade80');
                }
            } else {
                // Buy
                const tokens = getTokens();
                if (tokens < price) {
                    showToast(`Need ${price} $STUDY`, '#f87171');
                    return;
                }

                // Deduct tokens in Supabase
                await deductTokens(price);

                // Save purchase
                store.items = store.items || [];
                store.items.push(id);
                saveStore(store);

                // Auto equip
                if (cat === 'badges') { store.activeBadge = id; saveStore(store); }
                else if (cat === 'themes') { applyTheme(id); }

                const item = CATALOG[cat]?.find(i => i.id === id);
                showToast(`${item?.name} purchased & equipped! ✓`, '#4ade80');
                updateBalance();
            }
            render(cat);
        }

        function showToast(msg, color = '#4ade80') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = color === '#4ade80' ? '#052e16' : '#450a0a';
            t.style.color = color;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        // ── Tab switching ─────────────────────────────────────────────────
        document.getElementById('tabs').querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                render(tab.dataset.cat);
            });
        });

        // ── Init ──────────────────────────────────────────────────────────
        render('themes');
    </script>
</body>
</html>
