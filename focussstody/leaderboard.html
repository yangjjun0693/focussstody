<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focussstody · Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; background: #d0cbe5; color: #282456; transition: background 0.4s; }
        html.dark body { background: #1a1b1e; color: #f1f5f9; }

                .glass {
            background: rgba(255,255,255,0.48);
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.75);
            border-radius: 1.5rem;
            box-shadow: 0 8px 32px rgba(100,96,180,0.10), 0 2px 8px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.85);
            position: relative;
            overflow: hidden;
        }
        .glass::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.95) 40%, rgba(255,255,255,0.65) 70%, transparent);
            pointer-events: none; border-radius: 1.5rem 1.5rem 0 0;
        }
        html.dark .glass {
            background: rgba(255,255,255,0.055);
            backdrop-filter: blur(32px) saturate(140%);
            -webkit-backdrop-filter: blur(32px) saturate(140%);
            border-color: rgba(255,255,255,0.10);
            box-shadow: 0 8px 32px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.07);
        }
        html.dark .glass::before {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12) 40%, rgba(255,255,255,0.06) 70%, transparent);
        }

        .tab-btn {
            flex: 1; padding: 0.6rem; border: none;
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.25);
            font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 800;
            letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer;
            border-radius: 0.6rem; transition: all 0.2s; opacity: 0.4; color: inherit;
        }
        .tab-btn.active, .tab-btn[style*="opacity:1"] {
            background: rgba(255,255,255,0.55);
            border-color: rgba(255,255,255,0.75);
            opacity: 1 !important;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
        }
        html.dark .tab-btn { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.08); }
        html.dark .tab-btn.active, html.dark .tab-btn[style*="opacity:1"] { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.18); }


        /* Podium */
        .podium-item {
            display: flex; flex-direction: column; align-items: center;
            gap: 6px; flex: 1;
        }
        .podium-avatar {
            width: 42px; height: 42px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; font-weight: 900; color: #fff;
        }
        .podium-platform {
            width: 100%; border-radius: 0.6rem 0.6rem 0 0;
            display: flex; align-items: center; justify-content: center;
        }

        /* Row entries */
        .lb-row {
            display: flex; align-items: center; gap: 1rem;
            padding: 0.9rem 1rem; border-radius: 1rem;
            background: rgba(255,255,255,0.22);
            border: 1px solid rgba(255,255,255,0.38);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.60);
            margin-bottom: 0.4rem;
            transition: background 0.15s, box-shadow 0.15s;
            animation: fadeUp 0.4s cubic-bezier(0.22,1,0.36,1) both;
        }
        .lb-row:hover { background: rgba(255,255,255,0.38); box-shadow: inset 0 1px 0 rgba(255,255,255,0.85), 0 4px 12px rgba(100,96,180,0.08); }
        .lb-row.is-me { background: rgba(105,100,198,0.15); border: 1px solid rgba(105,100,198,0.35); box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 0 0 1px rgba(105,100,198,0.15); }
        html.dark .lb-row { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.07); box-shadow: none; }
        html.dark .lb-row:hover { background: rgba(255,255,255,0.08); }
        html.dark .lb-row.is-me { background: rgba(105,100,198,0.18); border-color: rgba(105,100,198,0.35); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .rank-badge {
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 900; flex-shrink: 0;
            background: rgba(255,255,255,0.1);
        }

        .spinner {
            width: 24px; height: 24px; border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent, #6964c6); border-radius: 50%;
            animation: spin 0.7s linear infinite; margin: 2rem auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div style="max-width:480px;margin:0 auto;padding:2rem 1.5rem 8rem;">

    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
        <div>
            <p style="font-size:9px;font-weight:800;letter-spacing:0.3em;text-transform:uppercase;opacity:0.4;">Focussstody</p>
            <h1 style="font-size:1.75rem;font-weight:900;letter-spacing:-0.03em;">Leaderboard</h1>
        </div>
        <button onclick="window.location.href='./app.html'"
            style="font-size:9px;font-weight:800;letter-spacing:0.2em;text-transform:uppercase;opacity:0.35;background:none;border:none;cursor:pointer;color:inherit;">
            ← Back
        </button>
    </div>

    <!-- Tabs -->
    <div id="lbTabTrack" class="glass flex gap-1 p-1 mb-4" style="border-radius:1rem;">
        <button class="tab-btn" id="tabGlobal" style="opacity:1;">🌍 All Time</button>
        <button class="tab-btn" id="tabWeekly" style="opacity:0.4;">📅 This Week</button>
    </div>

    <!-- Podium (top 3) -->
    <div id="podiumSection" class="glass p-4 mb-4" style="display:none;">
        <div id="podium" class="flex items-end justify-center gap-2"></div>
    </div>

    <!-- List -->
    <div class="glass p-4">
        <div id="lbSpinner" class="spinner"></div>
        <div id="lbList" style="display:none;"></div>
        <p id="lbEmpty" style="display:none;text-align:center;opacity:0.3;font-size:11px;font-weight:700;padding:2rem;">
            No data yet — start studying!
        </p>
    </div>

    <!-- Your rank -->
    <div id="myRankCard" class="glass p-4 mt-4" style="display:none;">
        <p style="font-size:9px;font-weight:800;letter-spacing:0.2em;text-transform:uppercase;opacity:0.4;margin-bottom:0.5rem;">Your Rank</p>
        <div class="flex items-center justify-between">
            <p style="font-size:1.5rem;font-weight:900;font-family:'DM Mono',monospace;" id="myRankNum">#—</p>
            <p style="font-size:11px;opacity:0.5;font-weight:700;" id="myRankTime">0h 0m</p>
        </div>
    </div>

</div>

<script type="module">
import { requireAuth } from './js/authcheck.js';
import { SlidingTabs } from './js/sliding-tabs.js';
const auth = await requireAuth();
if (!auth) throw new Error('Not authenticated');
const { supabase, username: myUsername } = auth;

// ── Theme & dark mode ───────────────────────────────────────────
const isDark   = localStorage.getItem('darkMode') === 'true';
const themeKey = localStorage.getItem('fv_theme') || 'default';
const ACCENTS  = { default:'#6964c6',midnight:'#60a5fa',forest:'#4ade80',sunset:'#f97316',ocean:'#22d3ee',mono:'#a3a3a3',cherry:'#fb7185',galaxy:'#a78bfa',gold:'#fbbf24' };
const accent   = ACCENTS[themeKey] || '#6964c6';
document.documentElement.classList.toggle('dark', isDark);
document.documentElement.style.setProperty('--accent', accent);


// ── Helpers ─────────────────────────────────────────────────────
function fmtTime(sec) {
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function getRank(exp) {
    if (exp < 3600)  return 'Apprentice';
    if (exp < 10800) return 'Scholar';
    if (exp < 36000) return 'Analyst';
    if (exp < 86400) return 'Researcher';
    return 'Grand Master';
}

function medalColor(i) {
    return ['#FFD700','#C0C0C0','#CD7F32'][i] || 'rgba(255,255,255,0.1)';
}

// ── Fetch data ──────────────────────────────────────────────────
async function fetchLeaderboard(mode) {
    // Fetch study data and profiles separately (more reliable than join)
    const [{ data: studyRows }, { data: profiles }] = await Promise.all([
        supabase.from('study_data').select('total_exp, weekly_log, streak, user_id').order('total_exp', { ascending: false }).limit(50),
        supabase.from('profiles').select('id, username'),
    ]);

    if (!studyRows?.length) return [];

    // Build lookup map
    const profileMap = {};
    profiles?.forEach(p => { profileMap[p.id] = p.username; });

    if (mode === 'weekly') {
        const today = new Date();
        const weekKeys = [];
        for (let i = 6; i >= 0; i--) {
            const d = new Date(today);
            d.setDate(today.getDate() - i);
            weekKeys.push(d.toISOString().slice(0, 10));
        }
        return studyRows
            .map(row => {
                const weekly  = row.weekly_log || {};
                const weekSec = weekKeys.reduce((sum, k) => sum + (weekly[k] || 0), 0);
                const uname   = profileMap[row.user_id] || 'Unknown';
                return { username: uname, totalSec: weekSec, streak: row.streak || 0, rank: getRank(row.total_exp), isMe: uname === myUsername };
            })
            .filter(r => r.totalSec > 0)
            .sort((a, b) => b.totalSec - a.totalSec);
    }

    return studyRows.map(row => {
        const uname = profileMap[row.user_id] || 'Unknown';
        return { username: uname, totalSec: row.total_exp || 0, streak: row.streak || 0, rank: getRank(row.total_exp), isMe: uname === myUsername };
    }).filter(r => r.totalSec > 0);
}

// ── Render ──────────────────────────────────────────────────────
function renderPodium(entries) {
    const top3 = entries.slice(0, 3);
    const podium = document.getElementById('podium');
    if (top3.length < 2) { document.getElementById('podiumSection').style.display = 'none'; return; }
    document.getElementById('podiumSection').style.display = 'block';

    // Order: 2nd, 1st, 3rd
    const order  = [top3[1], top3[0], top3[2]];
    const medals = ['🥈', '🥇', '🥉'];
    const places = [2, 1, 3];

    const platformH = ['44px', '60px', '32px']; // 2nd, 1st, 3rd
    podium.innerHTML = order.map((entry, i) => {
        if (!entry) return '';
        const col     = i === 1 ? accent : `rgba(255,255,255,0.15)`;
        const txtCol  = i === 1 ? '#fff' : 'inherit';
        const opacity = i === 1 ? '1' : '0.6';
        return `<div class="podium-item" style="opacity:${opacity};">
            <p style="font-size:9px;font-weight:800;width:100%;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${entry.username}</p>
            <p style="font-size:8px;opacity:0.45;font-weight:700;">${fmtTime(entry.totalSec)}</p>
            <div class="podium-avatar" style="background:${col};">${medals[i]}</div>
            <div class="podium-platform" style="height:${platformH[i]};background:${col};">
                <p style="font-size:11px;font-weight:900;color:${txtCol};opacity:0.7;">${places[i]}</p>
            </div>
        </div>`;
    }).join('');
}

function renderList(entries) {
    const list    = document.getElementById('lbList');
    const spinner = document.getElementById('lbSpinner');
    const empty   = document.getElementById('lbEmpty');
    const myCard  = document.getElementById('myRankCard');

    spinner.style.display = 'none';

    if (!entries.length) {
        empty.style.display = 'block';
        list.style.display  = 'none';
        return;
    }

    list.style.display  = 'block';
    empty.style.display = 'none';

    const medals = ['🥇','🥈','🥉'];
    list.innerHTML = entries.slice(0, 20).map((entry, i) => {
        const num     = i + 1;
        const badge   = medals[i] || `#${num}`;
        const streakTxt = entry.streak > 0 ? `🔥${entry.streak}` : '';
        return `<div class="lb-row ${entry.isMe ? 'is-me' : ''}" style="animation-delay:${i * 0.04}s">
            <div class="rank-badge" style="${i < 3 ? `background:transparent;font-size:1.1rem;` : ''}">${badge}</div>
            <div style="flex:1;min-width:0;">
                <div style="display:flex;align-items:center;gap:0.5rem;">
                    <p style="font-size:12px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${entry.username}${entry.isMe ? ' <span style="font-size:9px;opacity:0.5;">(you)</span>' : ''}</p>
                    ${streakTxt ? `<span style="font-size:9px;font-weight:700;opacity:0.6;">${streakTxt}</span>` : ''}
                </div>
                <p style="font-size:9px;opacity:0.4;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;">${entry.rank}</p>
            </div>
            <p style="font-size:11px;font-weight:800;font-family:'DM Mono',monospace;flex-shrink:0;">${fmtTime(entry.totalSec)}</p>
        </div>`;
    }).join('');

    // My rank card
    const myIdx = entries.findIndex(e => e.isMe);
    if (myIdx !== -1) {
        myCard.style.display = 'block';
        document.getElementById('myRankNum').textContent  = `#${myIdx + 1}`;
        document.getElementById('myRankTime').textContent = fmtTime(entries[myIdx].totalSec);
    }
}

// ── Load ────────────────────────────────────────────────────────
let currentMode = 'global';

async function load(mode) {
    document.getElementById('lbSpinner').style.display = 'block';
    document.getElementById('lbList').style.display    = 'none';
    document.getElementById('lbEmpty').style.display   = 'none';
    document.getElementById('podiumSection').style.display = 'none';
    document.getElementById('myRankCard').style.display = 'none';

    const entries = await fetchLeaderboard(mode);
    renderPodium(entries);
    renderList(entries);
}

load('global');

// ── Tab switch — sliding pill ────────────────────────────────────
const lbTabs = new SlidingTabs(document.getElementById('lbTabTrack'), (i) => {
    const isGlobal = i === 0;
    if (isGlobal) {
        load('global');
    } else {
        load('weekly');
    }
});
document.getElementById('tabGlobal').addEventListener('click', () => {
    document.getElementById('tabGlobal').classList.add('active');
    document.getElementById('tabWeekly').classList.remove('active');
    load('global');
});
document.getElementById('tabWeekly').addEventListener('click', () => {
    document.getElementById('tabWeekly').classList.add('active');
    document.getElementById('tabGlobal').classList.remove('active');
    load('weekly');
});
</script>
</body>
</html>
